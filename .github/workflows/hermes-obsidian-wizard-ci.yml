name: hermes-obsidian-wizard-ci

on:
  pull_request:
    paths:
      - 'hermes-obsidian-vps-wizard/**'
      - '.github/workflows/hermes-obsidian-wizard-ci.yml'
  push:
    branches: [ main ]
    paths:
      - 'hermes-obsidian-vps-wizard/**'
      - '.github/workflows/hermes-obsidian-wizard-ci.yml'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate and verify wizard outputs
        working-directory: hermes-obsidian-vps-wizard
        run: |
          set -euo pipefail
          python -m wizard.cli generate-example
          python -m wizard.cli verify
          python -m wizard.cli dry-run-all

      - name: Enforce key-handling and operator-doc policy
        working-directory: hermes-obsidian-vps-wizard
        run: |
          set -euo pipefail
          echo "Checking key handling policy..."
          ! grep -RIn -- "verify_vps_mcp\.sh .*<OBSIDIAN_API_KEY>" README.md docs wizard || (echo "Found forbidden VPS CLI key usage." && exit 1)
          ! grep -RIn -- "-ApiKey '<OBSIDIAN_API_KEY>'" README.md docs wizard || (echo "Found forbidden Windows CLI key example." && exit 1)
          ! grep -RIn -- '^OBSIDIAN_API_KEY=' hermes_provider_env.example templates/hermes_provider_env.example.tpl || (echo "Found OBSIDIAN_API_KEY persisted in VPS provider env example." && exit 1)
          test -f docs/SHARED_CONTROL_CONTRACT.md || (echo "Missing docs/SHARED_CONTROL_CONTRACT.md" && exit 1)
          test -f docs/DAY2_OPS_RUNBOOK.md || (echo "Missing docs/DAY2_OPS_RUNBOOK.md" && exit 1)
          echo "Policy checks passed."
